name: Günlük Resmi Gazete Taraması

on:
  schedule:
    - cron: "0 7 * * *"   # Her gün 07:00 (TR)
  workflow_dispatch:

jobs:
  rg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install requests

      - name: Günlük RG taraması
        run: python daily_rg/src/rg_run.py

      - name: Raporu commit et
        run: |
          git config user.name "ceei-bot"
          git config user.email "ceei-bot@example.com"
          git add daily_rg/output/daily_rg.md
          git commit -m "Günlük Resmi Gazete raporu" || echo "Değişiklik yok"
          git push
``
